<p-toast></p-toast>
<div class="min-h-screen grid grid-cols-1 lg:grid-cols-2 font-[tipo1]">

  <!-- Imagen lado izquierdo -->
  <div class="hidden lg:block relative overflow-hidden bg-gray-400">
    <img src="bannerlogin.jpg" alt="Imagen Agroindustrial" class="absolute inset-0 w-full h-full object-cover object-[85%_center]">
    
    <!-- Gradientes elegantes para profundidad -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/40 to-transparent"></div>
    <div class="absolute inset-0 bg-gradient-to-r from-green-50/60 to-transparent mix-blend-multiply"></div>

    <!-- Contenido decorativo superpuesto -->
    <div class="absolute bottom-10 left-0 w-full p-12 lg:p-20 text-white z-10 flex flex-col justify-end h-full">
      <div>
        <span class="inline-block px-4 py-1.5 bg-white/10 backdrop-blur-md border border-white/20 text-white text-[10px] font-bold uppercase tracking-[0.2em] rounded-full mb-6 shadow-lg">Portal Corporativo</span>
        <h1 class="text-4xl xl:text-6xl font-black mb-4 leading-[1.1] drop-shadow-lg">
          Cultivando <br/>
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-green-200">Excelencia</span>
        </h1>
        <p class="text-gray-300 text-lg max-w-md leading-relaxed font-medium drop-shadow-md mt-4">
          Conectamos el esfuerzo en el campo con la tecnología, potenciando el talento de nuestra gente.
        </p>
      </div>
    </div>
  </div>

  <!-- Formulario lado derecho -->
  <div class="flex items-center justify-center bg-white p-8">
    <p-card class="w-full p-3 m-5">

      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-medium text-gray-700">Bienvenido trabajador</h2>
        <img src="LogoNombreWhite.svg" alt="Agrokasa" class="h-12">
      </div>

      <h3 class="text-2xl font-semibold text-green-700 mb-6 text-center">INICIAR SESIÓN</h3>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-7">

        <p-float-label>
          <input pInputText id="dni" type="text" formControlName="username"
            class="w-full p-inputtext-sm border-gray-300">
          <label for="dni">Ingrese su DNI: </label>
        </p-float-label>

        <p-float-label>
          <p-password formControlName="password" [feedback]="false" [toggleMask]="true" styleClass="w-full"
            inputStyleClass="w-full">
          </p-password>
          <label for="password">Ingrese su contraseña:</label>
        </p-float-label>

        <div class="pt-2 ">
          <p-button type="submit" label="Ingresar" styleClass="p-button-success w-full"></p-button>
        </div>

        <div class="text-sm text-center mt-2">
          ¿Olvido la Contraseña?
          <a (click)="contrasena()" class="text-green-700 hover:underline cursor-pointer">Restablecer Contraseña</a>

        </div>
      </form>
    </p-card>
  </div>
</div>
