<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Tipos de Solicitud</h1>
      <p class="page-subtitle">Configuración y reglas de negocio para los documentos laborales</p>
    </div>
    <p-button label="Nuevo Tipo" icon="pi pi-plus" (onClick)="openNew()" styleClass="btn-primary"></p-button>
  </div>

  <div class="content-card">
    <p-table [value]="requestTypes" [loading]="isLoading" [paginator]="true" [rows]="10" styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr>
          <th>Nombre</th>
          <th>Prioridad Base</th>
          <th>SLA (Días)</th>
          <th class="text-center">Requiere Firma</th>
          <th class="text-center">Requiere Adjunto</th>
          <th class="text-center">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-type>
        <tr>
          <td class="font-medium">{{ type.name }}</td>
          <td>
            <p-tag [value]="getPriorityLabel(type.basePriority)" [severity]="getPrioritySeverity(type.basePriority)"></p-tag>
          </td>
          <td>{{ type.slaDays }}</td>
          <td class="text-center">
            <i class="pi" [ngClass]="{'pi-check-circle check-icon': type.requiresSignature, 'pi-times-circle times-icon': !type.requiresSignature}"></i>
          </td>
          <td class="text-center">
            <i class="pi" [ngClass]="{'pi-check-circle check-icon': type.requiresAttachment, 'pi-times-circle times-icon': !type.requiresAttachment}"></i>
          </td>
          <td class="text-center">
            <div class="action-buttons">
              <p-button icon="pi pi-pencil" styleClass="p-button-rounded p-button-text p-button-info" (onClick)="openEdit(type)" pTooltip="Editar"></p-button>
              <p-button icon="pi pi-trash" styleClass="p-button-rounded p-button-text p-button-danger" (onClick)="deleteType(type)" pTooltip="Eliminar"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="empty-state">
            <i class="pi pi-cog"></i>
            <p>No se encontraron tipos de solicitud.</p>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<!-- Modal Dialog -->
<p-dialog [(visible)]="displayDialog" [header]="isEditing ? 'Editar Tipo de Solicitud' : 'Nuevo Tipo de Solicitud'" [modal]="true" [style]="{width: '450px'}" styleClass="p-fluid">
  <ng-template pTemplate="content">
    <div class="dialog-field">
      <label for="name" class="dialog-label">Nombre de la Solicitud <span class="required">*</span></label>
      <input id="name" type="text" pInputText [(ngModel)]="currentType.name" required autofocus placeholder="Ej. Permiso por Mudanza" />
    </div>

    <div class="dialog-grid">
      <div class="dialog-field">
        <label for="priority" class="dialog-label">Prioridad (1-4)</label>
        <p-inputNumber id="priority" [(ngModel)]="currentType.basePriority" [min]="1" [max]="4" [showButtons]="true"></p-inputNumber>
      </div>
      <div class="dialog-field">
        <label for="sla" class="dialog-label">Días Límite (SLA)</label>
        <p-inputNumber id="sla" [(ngModel)]="currentType.slaDays" [min]="1" [showButtons]="true" suffix=" días"></p-inputNumber>
      </div>
    </div>

    <div class="checkbox-field">
      <p-checkbox [(ngModel)]="currentType.requiresSignature" [binary]="true" inputId="signature"></p-checkbox>
      <label for="signature" class="checkbox-label">Requiere Firma del Supervisor</label>
    </div>

    <div class="checkbox-field">
      <p-checkbox [(ngModel)]="currentType.requiresAttachment" [binary]="true" inputId="attachment"></p-checkbox>
      <label for="attachment" class="checkbox-label">Obligar a subir un Documento/Prueba</label>
    </div>
  </ng-template>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" icon="pi pi-times" styleClass="p-button-text" (onClick)="displayDialog = false"></p-button>
    <p-button label="Guardar" icon="pi pi-check" styleClass="btn-primary" (onClick)="saveType()"></p-button>
  </ng-template>
</p-dialog>
