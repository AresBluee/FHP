<div class="admin-layout">

  <!-- BACKDROP PARA MÓVIL -->
  <div *ngIf="isSidebarOpen" class="admin-backdrop" (click)="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="admin-sidebar" [ngClass]="{'is-open': isSidebarOpen}">

    <!-- Header del sidebar (solo móvil) -->
    <div class="sidebar-header-mobile">
      <span class="sidebar-title">Menú</span>
      <button (click)="closeSidebar()" class="sidebar-close-btn">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <!-- Navegación principal -->
    <nav class="sidebar-nav">
      <p-menu [model]="menuItems" class="sidebar-menu" styleClass="sidebar-primeng-menu">
        <ng-template pTemplate="item" let-item>
          <div class="sidebar-item-wrapper">
            <a *ngIf="item.routerLink"
               [routerLink]="item.routerLink"
               (click)="closeSidebar()"
               class="sidebar-link"
               [class.is-active]="seccionActiva === item.id">
              <i [class]="item.icon" class="sidebar-icon"></i>
              <span>{{ item.label }}</span>
            </a>
          </div>
        </ng-template>
      </p-menu>
    </nav>

    <!-- Footer del sidebar -->
    <div class="sidebar-footer">
      <a [routerLink]="profileLink" class="sidebar-link footer-link">
        <i class="pi pi-user sidebar-icon"></i>
        <span>Mi perfil</span>
      </a>
      <a (click)="cerrarSesion()" class="sidebar-link footer-link logout">
        <i class="pi pi-sign-out sidebar-icon"></i>
        <span>Cerrar sesión</span>
      </a>
    </div>

  </aside>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="admin-content">
    <router-outlet></router-outlet>
  </main>

</div>
