<div class="min-h-screen bg-gray-50/50 p-6">
  <div class="max-w-7xl mx-auto space-y-6">
    
    <div class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Mis Certificados</h1>
        <p class="text-gray-500 text-sm font-medium">Descarga tus constancias y documentos laborales.</p>
      </div>
    </div>

    <!-- Contenedor con Fondo Blanco y Bordes Redondeados -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
      
      <div *ngIf="loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100" *ngFor="let i of [1,2,3]">
          <p-skeleton height="2rem" styleClass="mb-2"></p-skeleton>
          <p-skeleton height="1rem" width="10rem" styleClass="mb-4"></p-skeleton>
          <p-skeleton height="2.5rem" styleClass="w-full"></p-skeleton>
        </div>
      </div>

      <div *ngIf="error" class="text-red-500 bg-red-50 border border-red-100 rounded-xl p-4 flex items-center gap-2">
        <i class="pi pi-exclamation-circle"></i>
        <span>{{ error }}</span>
      </div>

      <!-- Grid de Cards -->
      <div *ngIf="!loading && !error && certificates.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <div *ngFor="let cert of certificates" class="group bg-white rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow p-5 flex flex-col justify-between">
          <div class="space-y-3">
            <div class="flex justify-between items-start">
              <div class="w-10 h-10 rounded-lg bg-blue-50 text-blue-500 flex items-center justify-center">
                <i class="pi pi-file-pdf text-xl"></i>
              </div>
              <p-tag [value]="cert.documentType" severity="info" styleClass="text-xs font-bold"></p-tag>
            </div>
            
            <div>
              <h3 class="font-bold text-gray-800 truncate" [title]="cert.fileName">{{ cert.fileName }}</h3>
              <p class="text-xs text-gray-400 font-medium">Cargado el {{ cert.uploadDate | date:'dd/MM/yyyy' }}</p>
            </div>
          </div>

          <div class="mt-5">
            <button pButton type="button" label="Descargar" icon="pi pi-download" (click)="downloadCertificate(cert)" 
                    class="p-button-outlined p-button-sm w-full font-bold rounded-lg"></button>
          </div>
        </div>

      </div>

      <!-- Estado Vacío -->
      <div *ngIf="!loading && !error && certificates.length === 0" class="text-center text-gray-400 py-12">
        <i class="pi pi-folder-open text-4xl mb-3 block text-gray-300"></i>
        <p class="text-sm font-medium">No tienes certificados disponibles en este momento.</p>
      </div>

    </div>
  </div>
</div>
